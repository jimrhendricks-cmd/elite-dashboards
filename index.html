<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
:root{
  --bg:#07090D;--surface:#0C1017;--surface2:#111820;--surface3:#171F2B;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#E8ECF1;--text2:#9BA8B9;--text3:#5E6D82;
  --gold:#C9A84C;--gold2:#A3862E;--gold-dim:rgba(201,168,76,0.15);
  --green:#34D399;--green2:#059669;--green-dim:rgba(52,211,153,0.12);
  --red:#F87171;--red-dim:rgba(248,113,113,0.12);
  --blue:#60A5FA;--blue-dim:rgba(96,165,250,0.12);
  --purple:#A78BFA;--purple-dim:rgba(167,139,250,0.12);
  --steel:#3B5068;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.4;font-size:12px;}
.mono{font-family:'IBM Plex Mono',monospace;}
.container{max-width:1680px;margin:0 auto;padding:12px 16px;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.hdr p{font-size:9px;color:var(--text3);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.hdr-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.hm{text-align:right;}
.hm .hv{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;letter-spacing:-0.5px;}
.hm .hl{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:0.5px;}
.tag-green{background:var(--green-dim);color:var(--green);}
.tag-gold{background:var(--gold-dim);color:var(--gold);}
.tag-red{background:var(--red-dim);color:var(--red);}

/* PRIMARY NAV — 3 TABS */
.nav-primary{display:flex;gap:0;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.nav-primary .ptab{flex:1;background:none;border:none;color:var(--text3);padding:10px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.3px;transition:all 0.2s;text-align:center;border-right:1px solid var(--border);position:relative;}
.nav-primary .ptab:last-child{border-right:none;}
.nav-primary .ptab:hover{color:var(--text2);background:var(--surface2);}
.nav-primary .ptab.active{color:var(--text);background:var(--surface2);}
.nav-primary .ptab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:1px;}
.ptab-sub{font-size:8px;color:var(--text3);display:block;margin-top:1px;letter-spacing:0.8px;text-transform:uppercase;}

/* SUB NAV */
.nav-sub{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:0;flex-wrap:wrap;}
.nav-sub .stab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:6px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.3px;transition:all 0.2s;}
.nav-sub .stab:hover{color:var(--text2);}
.nav-sub .stab.active{color:var(--text);border-bottom-color:var(--gold);}

/* SECTIONS */
.section{display:none;animation:fadeIn 0.25s ease;}.section.active{display:block;}
.subsec{display:none;animation:fadeIn 0.2s ease;}.subsec.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.card-hd{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.card-title{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;}

/* REGION BLOCKS */
.rblock{border-bottom:1px solid var(--border);}.rblock:last-child{border-bottom:none;}
.rhead{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;transition:background 0.15s;flex-wrap:wrap;gap:4px;}
.rhead:hover{background:var(--surface2);}
.rtitle{font-size:12px;font-weight:700;letter-spacing:-0.2px;}
.rmeta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.rmi{text-align:center;}
.rmi .rv{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.rmi .rl{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
.pbar{height:3px;background:rgba(255,255,255,0.04);margin:0 16px;}
.pfill{height:100%;transition:width 1s ease;}
.chev{font-size:14px;color:var(--text3);transition:transform 0.2s;font-weight:300;}

/* TABLE */
.tw{padding:0;overflow-x:auto;}
table.t{width:100%;border-collapse:collapse;}
table.t th{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:5px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);}
table.t th.r,table.t td.r{text-align:right;}
table.t tr.tr:hover{background:var(--surface2);}
table.t td{padding:5px 10px;font-size:10px;border-bottom:1px solid var(--border);white-space:nowrap;}
.rnk{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-weight:700;font-size:9px;font-family:'IBM Plex Mono',monospace;}
.rnk-1{background:linear-gradient(135deg,#C9A84C,#A3862E);color:#000;}
.rnk-2{background:rgba(180,180,180,0.2);color:#C0C0C0;}
.rnk-3{background:rgba(180,120,60,0.2);color:#CD9B5A;}
.rnk-n{background:rgba(255,255,255,0.04);color:var(--text3);}
.nm{font-weight:600;letter-spacing:-0.2px;}
.rv2{font-family:'IBM Plex Mono',monospace;font-weight:600;}
.c-green{color:var(--green);}.c-red{color:var(--red);}.c-gold{color:var(--gold);}.c-blue{color:var(--blue);}.c-purple{color:var(--purple);}.c-dim{color:var(--text3);}

/* EXPANDABLE LOCATION DRILL-DOWN */
.loc-expand{cursor:pointer;transition:all 0.2s;position:relative;}
.loc-expand:hover{border-color:rgba(255,255,255,0.15) !important;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.loc-expand .expand-icon{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;transition:transform 0.3s;font-size:10px;color:var(--text3);}
.loc-expand.open .expand-icon{transform:rotate(180deg);}
.loc-detail{max-height:0;overflow:hidden;transition:max-height 0.4s ease,opacity 0.3s ease;opacity:0;}
.loc-expand.open .loc-detail{max-height:4000px;opacity:1;}
/* Table-row based drill-downs */
tr.loc-detail{display:none;max-height:none;overflow:visible;opacity:1;transition:none;}
tr.loc-expand.open+tr.loc-detail{display:table-row;}
tr.loc-expand{cursor:pointer;}
tr.loc-expand:hover td{background:rgba(255,255,255,0.02);}
.trainer-row{display:grid;grid-template-columns:28px 1fr 80px 80px 50px;gap:4px;align-items:center;padding:6px 8px;border-bottom:1px solid var(--border);font-size:10px;transition:background 0.15s;}
.trainer-row:hover{background:rgba(255,255,255,0.02);}
.trainer-row:last-child{border-bottom:none;}
.trainer-bar{height:4px;border-radius:2px;background:var(--surface3);overflow:hidden;}
.trainer-bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease;}

/* CLIENT PANEL */
.cpanel{display:none;background:var(--surface2);}.cpanel.open{display:table-row;}
.cp-inner{padding:10px 16px 14px;}
.cp-title{font-size:11px;font-weight:600;color:var(--gold);margin-bottom:6px;letter-spacing:0.3px;}
table.ct{width:100%;border-collapse:collapse;}
table.ct th{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:4px 8px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);}
table.ct td{padding:4px 8px;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03);}

/* KPI GRID */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:14px;}
.ki{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;transition:border-color 0.2s;}
.ki:hover{border-color:var(--border2);}
.ki .kv{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-0.5px;}
.ki .kl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
.ki .ks{font-size:10px;margin-top:4px;font-weight:500;color:var(--text3);}

/* FEEDER */
.feeder{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin:10px 14px 14px;}
.ff{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;text-align:center;flex:1;min-width:120px;}
.fn .fv{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;}
.fn .fl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}

/* PODIUM */
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;padding:14px 14px 0;}
.pod{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;transition:border-color 0.2s;}
.pod:hover{border-color:var(--border2);}
.pod .pr{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;line-height:1;}
.pod .pn{font-size:13px;font-weight:700;margin-top:6px;}
.pod .prg{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
.pod .prev{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:var(--gold);margin-top:6px;}
.pod-1{border-color:rgba(201,168,76,0.3);}.pod-1 .pr{color:var(--gold);}
.pod-2{border-color:rgba(192,192,192,0.2);}.pod-2 .pr{color:#B0B0B0;}
.pod-3{border-color:rgba(205,155,90,0.2);}.pod-3 .pr{color:#CD9B5A;}

/* PAY PERIOD */
.ppg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;padding:14px;}
.ppc{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;}
.ppc h4{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-weight:600;}
.ppr{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.ppn{width:90px;font-size:10px;font-weight:600;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2);}
.ppt{flex:1;height:14px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden;}
.ppf{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;font-size:8px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--bg);min-width:28px;}
.ppf.p1{background:var(--steel);color:var(--text);}.ppf.p2{background:var(--gold2);color:#000;}

/* CHARTS */
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:12px;margin-bottom:12px;}
.cb{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;}
.cb h3{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-weight:600;}

/* GRAND TOTAL */
.grand{background:var(--surface);border:1px solid rgba(201,168,76,0.2);border-radius:10px;padding:20px;margin-top:14px;}
.gt{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.gl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);}
.gv{font-family:'IBM Plex Mono',monospace;font-size:clamp(24px,4vw,36px);font-weight:700;color:var(--gold);letter-spacing:-1px;}
.gs{font-size:12px;color:var(--text3);margin-top:6px;}
.bridge{display:grid;grid-template-columns:1fr auto;gap:3px 14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;}
.bridge .bl{color:var(--text2);}.bridge .bv{font-family:'IBM Plex Mono',monospace;font-weight:600;text-align:right;}
.bridge .bt{color:var(--gold);font-weight:700;padding-top:6px;border-top:1px solid var(--gold2);}

/* LEAD/LAG BANNER */
.llb{background:linear-gradient(135deg,#0f172a,#1e1b4b);border:1px solid var(--purple);border-radius:8px;padding:12px;margin-bottom:12px;text-align:center;}
.llb h2{font-size:12px;font-weight:700;color:var(--purple);letter-spacing:1px;}
.llb p{font-size:9px;color:var(--text3);margin-top:2px;}

/* ANNUAL METRIC CARDS */
.am{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:12px;}
.ac{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.ac .av{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;}
.ac .al{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-top:2px;}

/* FOOTER */
.footer{text-align:center;padding:24px 0;font-size:9px;color:var(--text3);letter-spacing:1px;}

@media(max-width:768px){
  body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  .container{padding:8px;}
  .hdr h1{font-size:14px;}
  .hm .hv{font-size:14px;}
  .nav-primary .ptab{padding:8px 6px;font-size:10px;}
  .ptab-sub{font-size:7px;}
  .nav-sub{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;}
  .nav-sub::-webkit-scrollbar{display:none;}
  .nav-sub .stab{white-space:nowrap;flex-shrink:0;}
  .podium{grid-template-columns:1fr;}
  .kg{grid-template-columns:repeat(2,1fr);}
  .cg{grid-template-columns:1fr;}
  .tw{-webkit-overflow-scrolling:touch;}
  .ppg{grid-template-columns:1fr;}
  .am{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:1920px){.hdr h1{font-size:24px;}}
</style>
</head>

function fmt(n){return '$'+Math.abs(n).toLocaleString();}
function fmtD(n){return (n<0?'-':'')+'$'+Math.abs(Math.round(n)).toLocaleString();}
function pct(a,b){return b?((a/b)*100).toFixed(1):'0.0';}
function pctF(a,b){return b?((a/b)*100).toFixed(1):'0.0';}
function pctC(v){return v>=100?'c-green':v>=85?'c-gold':'c-red';}
function countUp(el,target){if(!el)return;let s=0;const d=1200;const st=performance.now();const pre='$';function step(now){const p=Math.min((now-st)/d,1);const ep=1-Math.pow(1-p,3);s=Math.round(ep*target);el.textContent=pre+s.toLocaleString();if(p<1)requestAnimationFrame(step);}requestAnimationFrame(step);}

    var memGrow=i>0?((y.mem/[1184,1853,2612][i-1]-1)*100).toFixed(1):null;
    h+='<div style="background:var(--surface2);border:1px solid '+(isLast?'rgba(201,168,76,0.25)':'var(--border)')+';border-radius:8px;padding:14px;text-align:center;'+(isLast?'box-shadow:0 0 12px rgba(201,168,76,0.06);':'')+'position:relative;overflow:hidden;">';
    if(isLast) h+='<div style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);"></div>';
    h+='<div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;font-weight:600;">Mar '+y.yr+'</div>';
    h+='<div class="mono" style="font-size:22px;font-weight:700;color:'+(isLast?'var(--gold)':'var(--text)')+';margin-top:6px;">$'+total.toLocaleString()+'</div>';
    if(ptGrow!==null){var g=parseFloat(ptGrow);h+='<div style="font-size:10px;color:'+(g>=0?'var(--green)':'var(--red)')+';margin-top:3px;font-weight:600;">'+(g>=0?'+':'')+ptGrow+'% PT</div>';}
    h+='<div style="display:flex;justify-content:center;gap:16px;margin-top:8px;">';
    h+='<div><div class="mono" style="font-size:13px;font-weight:600;color:var(--blue);">'+y.mem.toLocaleString()+'</div><div style="font-size:7px;color:var(--text3);text-transform:uppercase;">Members</div>';
    if(memGrow!==null){var mg=parseFloat(memGrow);h+='<div style="font-size:8px;color:'+(mg>=0?'var(--green)':'var(--red)')+';font-weight:600;">'+(mg>=0?'+':'')+memGrow+'%</div>';}
    h+='</div>';
    h+='<div><div class="mono" style="font-size:13px;font-weight:600;color:var(--purple);">$'+Math.round(y.dues).toLocaleString()+'</div><div style="font-size:7px;color:var(--text3);text-transform:uppercase;">Dues</div></div>';
    h+='</div></div>';
  });
  h+='</div></div>';

  // ===== CHARTS =====
  h+='<div class="cg">';
  h+='<div class="card"><div class="card-hd"><span class="card-title">PT Revenue Trend</span></div><div style="padding:12px;"><canvas id="ann-pt"></canvas></div></div>';
  h+='<div class="card"><div class="card-hd"><span class="card-title">Membership Growth</span></div><div style="padding:12px;"><canvas id="ann-mem"></canvas></div></div>';
  h+='</div>';
  h+='<div class="cg">';
  h+='<div class="card"><div class="card-hd"><span class="card-title">Dues vs Goal</span></div><div style="padding:12px;"><canvas id="ann-dues"></canvas></div></div>';
  h+='<div class="card"><div class="card-hd"><span class="card-title">MOM Growth</span></div><div style="padding:12px;"><canvas id="ann-mom"></canvas></div></div>';
  h+='</div>';

  el.innerHTML=h;

  // Build charts
  var mLabels=fy.map(function(m){return m.m;});
  Chart.defaults.color='#5E6D82';Chart.defaults.borderColor='rgba(255,255,255,0.04)';Chart.defaults.font.family="'DM Sans',sans-serif";

  new Chart(document.getElementById('ann-pt'),{type:'line',data:{labels:mLabels,datasets:[{label:'PT Revenue',data:fy.map(function(m){return m.ptRev;}),borderColor:'#C9A84C',backgroundColor:'rgba(201,168,76,0.08)',fill:true,borderWidth:2,pointRadius:3,pointBackgroundColor:'#C9A84C',tension:0.3},{label:'$225K Goal',data:Array(fy.length).fill(225000),borderColor:'rgba(52,211,153,0.4)',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:10}},tooltip:{callbacks:{label:function(c){return c.dataset.label+': $'+c.raw.toLocaleString();}}}},scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{ticks:{callback:function(v){return '$'+(v/1000).toFixed(0)+'K';}},grid:{color:'rgba(255,255,255,0.03)'}}}}});

  new Chart(document.getElementById('ann-mem'),{type:'line',data:{labels:mLabels,datasets:[{label:'Total Members',data:fy.map(function(m){return m.tot;}),borderColor:'#34D399',backgroundColor:'rgba(52,211,153,0.08)',fill:true,borderWidth:2,pointRadius:3,pointBackgroundColor:'#34D399',tension:0.3},{label:'3,000 Goal',data:Array(fy.length).fill(3000),borderColor:'rgba(96,165,250,0.4)',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:10}}},scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{grid:{color:'rgba(255,255,255,0.03)'}}}}});

  new Chart(document.getElementById('ann-dues'),{type:'bar',data:{labels:mLabels,datasets:[{label:'Actual',data:fy.map(function(m){return Math.round(m.dues);}),backgroundColor:fy.map(function(m){return m.dues>=m.duesG?'#059669':'#DC2626';}),borderRadius:3},{label:'Goal',data:fy.map(function(m){return Math.round(m.duesG);}),backgroundColor:'rgba(201,168,76,0.15)',borderColor:'#C9A84C',borderWidth:1,borderRadius:3}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:10}},tooltip:{callbacks:{label:function(c){return c.dataset.label+': $'+c.raw.toLocaleString();}}}},scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{ticks:{callback:function(v){return '$'+(v/1000).toFixed(0)+'K';}},grid:{color:'rgba(255,255,255,0.03)'}}}}});

  new Chart(document.getElementById('ann-mom'),{type:'bar',data:{labels:mLabels,datasets:[{data:fy.map(function(m){return Math.round(m.mom);}),backgroundColor:fy.map(function(m){return m.mom>=0?'#059669':'#DC2626';}),borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return (c.raw>=0?'+':'')+fmtD(c.raw);}}}},scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{ticks:{callback:function(v){return (v>=0?'+':'')+fmtD(v);}},grid:{color:'rgba(255,255,255,0.03)'}}}}});
}
